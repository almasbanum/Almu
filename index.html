<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile Card</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#090028,#22004d);
}

.card{
text-align:center;
color:white;
width:350px;
}

.card img{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
}

.card h1{
font-size:48px;
margin-top:20px;
}

.card p{
font-size:26px;
color:#d6d6d6;
margin-top:10px;
}

.stars{
font-size:32px;
color:gold;
margin:20px 0;
}

.follow-btn{
width:300px;
height:75px;
border:none;
border-radius:50px;
font-size:30px;
color:white;
background:linear-gradient(to right,#ff1493,#8a2be2);
}
</style>

</head>

<body>

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png" alt="Girl">

<h1>Almas Banu M</h1>

<p>Web Developer</p>

<div class="stars">★★★★★</div>

<button class="follow-btn">Follow</button>

</div>

</body>
  </html>
